<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-input: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: #475569;
            --border-light: rgba(71, 85, 105, 0.3);
            --focus-color: #0ea5e9;
            --focus-shadow: rgba(14, 165, 233, 0.2);
            --gradient: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            --radial-bg: radial-gradient(circle at top, rgba(59, 130, 246, 0.12), transparent 30%),
                         linear-gradient(180deg, #1a2a4a 0%, #0f1929 100%);
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--radial-bg);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text-primary);
        }

        .box {
            width: min(420px, calc(100vw - 32px));
            background: var(--bg-secondary);
            padding: 32px 28px;
            border-radius: 30px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.12);
            border: 1px solid var(--border-light);
        }

        h2 {
            margin: 0 0 24px;
            text-align: center;
            font-size: 1.75rem;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        form label {
            display: grid;
            gap: 8px;
            margin-top: 16px;
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        input,
        select,
        button {
            width: 100%;
            font: inherit;
        }

        input,
        select {
            border: 1px solid var(--border-color);
            border-radius: 16px;
            background: var(--bg-input);
            padding: 14px 16px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            color: var(--text-primary);
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--focus-color);
            box-shadow: 0 0 0 4px var(--focus-shadow);
            background: var(--bg-secondary);
        }

        .password-field {
            position: relative;
            width: 100%;
        }

        .password-field input {
            width: 100%;
            padding-right: 58px;
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 16px;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 18px;
            user-select: none;
            border: none;
            background: transparent;
            padding: 0;
        }

        .toggle-password:hover {
            color: var(--text-primary);
        }

        form button {
            margin-top: 24px;
            border: none;
            border-radius: 16px;
            padding: 14px 18px;
            font-weight: 700;
            color: #ffffff;
            background: var(--gradient);
            box-shadow: 0 14px 30px rgba(59, 130, 246, 0.18);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        form button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 40px rgba(59, 130, 246, 0.22);
        }

        p {
            margin: 18px 0 0;
            font-size: 0.95rem;
            color: var(--text-muted);
            text-align: center;
        }

        a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }

        #message {
            min-height: 24px;
            margin-top: 14px;
            font-size: 0.97rem;
            line-height: 1.4;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>User / Admin Login</h2>

    <form id="authForm" novalidate>

        <label>
            Role
            <select id="role" required>
                <option value="">Select role</option>
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
        </label>

        <label>
            Email
            <input id="email" type="email" placeholder="Enter Email" required>
        </label>

        <label>
            Password

            <div class="password-field">

                <input id="password" type="password" placeholder="Enter Password" required>

                <span class="toggle-password" onclick="togglePasswordVisibility()">👁️</span>

            </div>

        </label>

        <button type="button" id="loginBtn">Login</button>

    </form>

    <p style="margin-top:10px; color:#555; font-size:0.95rem;">
        Not registered yet?
        <a id="registerLink" href="register.html">Register here</a>.
    </p>

    <div id="message" style="margin-top:10px;color:#d00;font-weight:600;"></div>

</div>

<script>

    const authForm = document.getElementById('authForm');
    const role = document.getElementById('role');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const message = document.getElementById('message');
    const loginBtn = document.getElementById('loginBtn');

    function togglePasswordVisibility() {

        const passwordToggle = document.querySelector('.toggle-password');

        if(passwordInput.type === 'password'){
            passwordInput.type = 'text';
            passwordToggle.textContent = '🙈';
        }
        else{
            passwordInput.type = 'password';
            passwordToggle.textContent = '👁️';
        }
    }

    function showMessage(text, isError = true) {

        message.textContent = text;
        message.style.color = isError ? '#d00' : '#070';
    }

    function validateForm() {

        if (!role.value) {
            showMessage('Please select a role.');
            role.focus();
            return false;
        }

        if (!emailInput.value.trim()) {
            showMessage('Email is required.');
            emailInput.focus();
            return false;
        }

        if (!emailInput.checkValidity()) {
            showMessage('Please enter a valid email address.');
            emailInput.focus();
            return false;
        }

        if (!passwordInput.value) {
            showMessage('Password is required.');
            passwordInput.focus();
            return false;
        }

        if (passwordInput.value.length < 6) {
            showMessage('Password must be at least 6 characters.');
            passwordInput.focus();
            return false;
        }

        showMessage('', false);
        return true;
    }

    async function handleLogin() {

        if (!validateForm()) return;

        const response = await fetch('/login_user', {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({

                role: role.value,
                email: emailInput.value,
                password: passwordInput.value

            })

        });

        const data = await response.json();

        if (data.success) {

            showMessage(data.message, false);

            // Save user email for chat history
            localStorage.setItem('user_email', emailInput.value);

            setTimeout(() => {

                // Redirect according to selected role
                if (role.value === 'admin') {

                    window.location.href = 'admin.html';

                } 
                else {

                    window.location.href = 'user.html';
                }

            }, 1000);

        } else {

            showMessage(data.message);
        }
    }

    loginBtn.addEventListener('click', handleLogin);

</script>

</body>
</html>
