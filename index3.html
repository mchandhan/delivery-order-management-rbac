<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Nexus — AI Order Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Bricolage+Grotesque:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            display: ['"Bricolage Grotesque"', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }

    :root {
      --bg-app: #f0f4f8; --bg-panel: #ffffff; --bg-chat: #f8fafc; --bg-input: #ffffff;
      --border-color: #e2e8f0; --text-primary: #0d1117; --text-secondary: #5a6a85; --text-tertiary: #94a3b8;
      --bubble-bot-bg: #ffffff; --bubble-bot-fg: #0d1117; --bubble-user-bg: #2563eb; --bubble-user-fg: #ffffff;
      --accent: #2563eb; --accent-light: #dbeafe;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.06); --shadow-md: 0 4px 16px rgba(0,0,0,.07); --shadow-lg: 0 10px 40px rgba(0,0,0,.1);
    }

    html.dark {
      --bg-app: #0a0f1a; --bg-panel: #111827; --bg-chat: #0d1117; --bg-input: #1a2236;
      --border-color: #1f2d45; --text-primary: #e8edf5; --text-secondary: #7e93b0; --text-tertiary: #4a5a75;
      --bubble-bot-bg: #151f2e; --bubble-bot-fg: #e8edf5; --bubble-user-bg: #2563eb; --bubble-user-fg: #ffffff;
      --accent: #3b82f6; --accent-light: #1e3a5f;
    }

    #app { display: flex; height: 100dvh; background: var(--bg-app); transition: background 0.3s ease; }
    #left-panel { width: 38%; min-width: 280px; max-width: 460px; background: var(--bg-panel); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
    #right-panel { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--bg-chat); overflow: hidden; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 99px; }

    #brand-header { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 60%, #2563eb 100%); padding: 20px 22px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .brand-icon { width: 38px; height: 38px; border-radius: 10px; background: rgba(255,255,255,0.15); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; }

    #left-content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .product-card { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-md); }
    .product-img-area { width: 100%; aspect-ratio: 4/3; position: relative; background: var(--bg-chat); display: flex; align-items: center; justify-content: center; }
    #product-img { width: 100%; height: 100%; object-fit: cover; display: none; }

    .detail-card { background: var(--bg-panel); border: 1px solid var(--border-color); border-radius: 14px; padding: 14px 16px; box-shadow: var(--shadow-sm); }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border-color); }
    .detail-row:last-child { border-bottom: none; }

    #chat-header { background: var(--bg-panel); border-bottom: 1px solid var(--border-color); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; box-shadow: var(--shadow-sm); z-index: 10; }
    #chat-messages { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 12px; background-color: var(--bg-chat); scroll-behavior: smooth; }

    .msg-row { display: flex; align-items: flex-end; gap: 10px; width: 100%; animation: msgIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; }
    .bot-av { background: linear-gradient(135deg, #dbeafe, #93c5fd); color: #1d4ed8; }
    .user-av { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: #fff; }

    .bubble-wrap { max-width: min(75%, 520px); display: flex; flex-direction: column; gap: 4px; }
    .msg-row.user .bubble-wrap { align-items: flex-end; }
    .bubble { padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.6; word-wrap: break-word; }
    .bot-bubble { background: var(--bubble-bot-bg); color: var(--bubble-bot-fg); border-bottom-left-radius: 5px; border: 1px solid var(--border-color); }
    .user-bubble { background: var(--bubble-user-bg); color: var(--bubble-user-fg); border-bottom-right-radius: 5px; }

    #input-section { background: var(--bg-panel); border-top: 1px solid var(--border-color); padding: 14px 16px 16px; flex-shrink: 0; }
    #composer { display: flex; align-items: flex-end; gap: 8px; background: var(--bg-input); border: 1.5px solid var(--border-color); border-radius: 18px; padding: 10px 12px; }
    #msg-input { flex: 1; background: transparent; border: none; outline: none; resize: none; max-height: 130px; font-size: 15px; color: var(--text-primary); }

    .tool-btn { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
    .tool-btn:hover { background: var(--border-color); }
    .send-btn { width: 38px; height: 38px; border-radius: 12px; background: #2563eb; color: #fff; display: flex; align-items: center; justify-content: center; transition: 0.2s; }

    @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .dm-toggle { width: 46px; height: 26px; border-radius: 99px; background: #cbd5e1; position: relative; cursor: pointer; }
    html.dark .dm-toggle { background: #3b82f6; }
    .dm-toggle::after { content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%; background: #fff; top: 3px; left: 3px; transition: 0.3s; }
    html.dark .dm-toggle::after { transform: translateX(20px); }

    .section-label { font-family: 'Bricolage Grotesque', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.25); }

    /* Typing Indicator */
    .typing-bubble { background: var(--bubble-bot-bg); border: 1px solid var(--border-color); border-radius: 20px; border-bottom-left-radius: 5px; padding: 12px 16px; display: flex; align-items: center; gap: 5px; width: fit-content; }
    .t-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-tertiary); animation: tdot 1.3s infinite; }
    .t-dot:nth-child(2) { animation-delay: 0.2s; }
    .t-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }

    @media (max-width: 700px) { #left-panel { display: none; } }
  </style>
</head>

<body>
  <div id="app">
    <aside id="left-panel">
      <div id="brand-header">
        <div class="brand-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" /></svg>
        </div>
        <div>
          <div style="font-family:'Bricolage Grotesque',sans-serif; font-size:17px; font-weight:800; color:#fff;">NOVA NEXUS</div>
          <div style="font-size:11px; color:rgba(255,255,255,0.55);">Order Intelligence Platform</div>
        </div>
      </div>

      <div id="left-content">
        <div class="section-label">Product Preview</div>
        <div class="product-card">
          <div class="product-img-area">
            <div id="img-placeholder" style="text-align:center; padding:20px;">
              <p style="font-size:12px; color:var(--text-tertiary);">Images appear here during chat</p>
            </div>
            <img id="product-img" src="" alt="Product" />
          </div>
          <div id="product-title-area" style="display:none; padding:12px; border-top:1px solid var(--border-color);">
            <div id="product-name" style="font-weight:700; font-size:14px;"></div>
            <div id="product-cat" style="font-size:11px; color:var(--text-tertiary);"></div>
          </div>
        </div>
        <div id="order-card" class="detail-card" style="display:none;">
          <div class="section-label" style="margin-bottom:8px;">Order Details</div>
          <div id="detail-rows"></div>
        </div>
      </div>
    </aside>

    <main id="right-panel">
      <div id="chat-header">
        <div style="display:flex; align-items:center; gap:12px;">
          <div style="width:36px; height:36px; border-radius:10px; background:#2563eb; display:flex; align-items:center; justify-content:center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
          </div>
          <div>
            <div style="font-weight:700; font-size:14px;">AI Order Assistant</div>
            <div style="display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-tertiary);">
              <div class="status-dot"></div> Online
            </div>
          </div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
          <div class="dm-toggle" onclick="toggleDark()"></div>
          <button class="tool-btn" onclick="clearChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>

      <div id="chat-messages"></div>

      <div id="input-section">
        <div id="composer">
          <textarea id="msg-input" rows="1" placeholder="Type your message..." onkeydown="onKey(event)" oninput="growTextarea(this)"></textarea>
          <button class="send-btn" onclick="sendMessage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script>
    let orders = JSON.parse(localStorage.getItem('nova_orders')) || [];

    function scrollToBottom() {
      const el = document.getElementById('chat-messages');
      el.scrollTop = el.scrollHeight;
    }

    function addMessage(role, content) {
      const area = document.getElementById('chat-messages');
      const isUser = role === 'user';
      const row = document.createElement('div');
      row.className = `msg-row ${isUser ? 'user' : 'bot'}`;
      row.innerHTML = `
        <div class="msg-avatar ${isUser ? 'user-av' : 'bot-av'}">${isUser ? 'U' : 'N'}</div>
        <div class="bubble-wrap">
          <div class="bubble ${isUser ? 'user-bubble' : 'bot-bubble'}">${content}</div>
          <div style="font-size:10px; color:var(--text-tertiary); margin-top:2px;">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
        </div>
      `;
      area.appendChild(row);
      scrollToBottom();
    }

    function showTyping() {
      const area = document.getElementById('chat-messages');
      const id = 'typing-' + Date.now();
      const div = document.createElement('div');
      div.id = id;
      div.className = 'msg-row bot';
      div.innerHTML = `
        <div class="msg-avatar bot-av">N</div>
        <div class="typing-bubble">
          <div class="t-dot"></div>
          <div class="t-dot"></div>
          <div class="t-dot"></div>
        </div>
      `;
      area.appendChild(div);
      scrollToBottom();
      return id;
    }

    function hideTyping(id) {
      const el = document.getElementById(id);
      if (el) el.remove();
    }

    async function saveChatMessage(role, content) {
      const email = localStorage.getItem('user_email') || 'anonymous@example.com';
      fetch("/api/chat_history", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, role, content })
      });
    }

    async function sendMessage() {
      const inp = document.getElementById('msg-input');
      const text = inp.value.trim();
      if (!text) return;
      addMessage('user', text);
      saveChatMessage('user', text);
      inp.value = '';
      inp.style.height = 'auto';

      const typingId = showTyping();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "deepseek-ai/DeepSeek-V4-Pro:novita",
            messages: [
              { role: "system", content: "You are Nova, an order assistant. If user orders, include this: {\"action\":\"create_order\",\"data\":{\"partName\":\"...\",\"material\":\"...\",\"quantity\":100,\"deadline\":\"...\"}}" },
              { role: "user", content: text }
            ]
          })
        });
        const data = await res.json();
        const aiContent = data.choices[0].message.content || "";
        
        hideTyping(typingId);
        saveChatMessage('bot', aiContent);
        
        // Improved JSON extractor to handle nested objects
        const jsonMatch = aiContent.match(/\{"action"[\s\S]*?\}(?=\s*$|[^}]*$)/) || aiContent.match(/\{"action"[\s\S]*\}/);
        if (jsonMatch) {
          try {
            const parsed = JSON.parse(jsonMatch[0]);
            if (parsed.action === 'create_order') {
              const d = parsed.data;
              const order = { id: "NN-"+(orders.length+1), ...d, status: "Received" };
              orders.push(order);
              localStorage.setItem('nova_orders', JSON.stringify(orders));
              saveToDB(order);
              updatePreview(order);

              const cleanText = aiContent.replace(/\{"action"[\s\S]*?\}/, '').trim();
              addMessage('bot', `
                ${cleanText || "I've processed your order!"}
                <div style="background:rgba(34,197,94,0.1); border-left:3px solid #22c55e; padding:10px; border-radius:8px; margin-top:10px;">
                  <strong style="color:#16a34a">✅ Order Confirmed: ${order.id}</strong><br>
                  <span style="font-size:13px;">
                    • <strong>Part:</strong> ${order.partName}<br>
                    • <strong>Material:</strong> ${order.material}<br>
                    • <strong>Quantity:</strong> ${order.quantity}<br>
                    • <strong>Deadline:</strong> ${order.deadline || 'Not specified'}
                  </span>
                </div>
              `);
            }
          } catch (jsonErr) {
            console.error("JSON Parse Error:", jsonErr, "Match was:", jsonMatch[0]);
            addMessage('bot', aiContent); // Fallback to raw text
          }
        } else {
          addMessage('bot', aiContent);
        }
      } catch (e) {
        hideTyping(typingId);
        addMessage('bot', "Error: " + e.message);
      }
    }

    async function saveToDB(order) {
      fetch("/api/orders", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(order) });
    }

    function updatePreview(order) {
      document.getElementById('product-img').src = "https://picsum.photos/400/300";
      document.getElementById('product-img').style.display = 'block';
      document.getElementById('img-placeholder').style.display = 'none';
      document.getElementById('product-name').textContent = order.partName;
      document.getElementById('product-cat').textContent = `${order.material} • ${order.quantity} units`;
      
      const details = `
        <div class="detail-row"><span>Order ID</span><span>${order.id}</span></div>
        <div class="detail-row"><span>Material</span><span>${order.material}</span></div>
        <div class="detail-row"><span>Quantity</span><span>${order.quantity}</span></div>
        <div class="detail-row"><span>Deadline</span><span>${order.deadline || 'N/A'}</span></div>
        <div class="detail-row"><span>Status</span><span style="color:#22c55e">✅ Received</span></div>
      `;
      document.getElementById('detail-rows').innerHTML = details;
      document.getElementById('order-card').style.display = 'block';
      document.getElementById('product-title-area').style.display = 'block';
    }

    function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
    function toggleDark() { document.documentElement.classList.toggle('dark'); }
    function growTextarea(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
    function clearChat() { document.getElementById('chat-messages').innerHTML = ''; showWelcome(); }
    function showWelcome() { addMessage('bot', "Hello! I'm Nova. How can I help with your order today?"); }

    window.onload = showWelcome;
  </script>
</body>
</html>
